name: Core Source CI

on:
  push:
    branches:
      - main
      - 'release/*'
    paths:
      - 'src/**'
      - 'app/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Codebase
        run: |
          echo "Changes detected in src/ or app/ on branch: ${{ github.ref_name }}"
          echo "Executing application builds and tests..."
