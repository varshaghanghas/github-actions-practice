name: Test Self-Hosted Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-on-my-hardware:
    name: Execute on Container Runner
    runs-on: self-hosted
    steps:
      - name: System Diagnostics
        run: |
          echo "=== Hostname ==="
          hostname
          echo "=== Working Directory ==="
          pwd

      - name: Create Persistent File
        run: |
          echo "GitHub Actions was here!" > github_test_file.txt
          echo "File created successfully inside the workspace."
