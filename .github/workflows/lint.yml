# what is the goal of this workflow
# Goal: whenever someone changes the app.py code, the linter will check if the syntax, format, identation (linting) is correct or not

name: Auto Linter

on:
  push:
    # when *.py changes/push
    paths: "*.py"

jobs:
  code-linting:
    runs-on: ubuntu-latest
    steps:
      # this step will automatically clone the code of current branch into the runner
      - name: Checkout/clone the code
        uses: actions/checkout@v7

      # this step will install python
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # this step will install the linting tool
      - name: Install Linter
        run: pip install ruff

      # this step will run the linter
      - name: Check the files for lointing
        run: ruff check .
        
